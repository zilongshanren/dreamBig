x-logging: &default-logging
  # Keep 3 × 20MB per container = 60MB max per service.
  # Essential on small VPSes — docker default is unbounded and will fill the disk.
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  # PostgreSQL database (pgvector image = postgres:16 + pgvector extension prebuilt)
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: dreambig
      POSTGRES_PASSWORD: dreambig
      POSTGRES_DB: dreambig
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dreambig"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for job queue + caching
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js web application
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://dreambig:dreambig@db:5432/dreambig
      REDIS_URL: redis://redis:6379/0
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # Auth.js v5 — trust the Host header forwarded by Caddy reverse proxy.
      # Without this, /api/auth/* returns UntrustedHost in production mode.
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      # Public signup toggle. Default false for production safety — anyone
      # hitting /signup will get 403 unless this is flipped to "true".
      # The first-user bootstrap case still works regardless of this setting.
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-false}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Python scraper workers
  scraper:
    build:
      context: ./workers
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    command: rq worker --url redis://redis:6379/0 --path /app
    volumes:
      - ./shared:/shared:ro
    environment:
      DATABASE_URL: postgresql://dreambig:dreambig@db:5432/dreambig
      REDIS_URL: redis://redis:6379/0
      SCRAPE_PROXY_URL: ${SCRAPE_PROXY_URL:-}
      TIKHUB_API_KEY: ${TIKHUB_API_KEY:-}
      # TikHub cost controls (see .env.example for budget math)
      SOCIAL_SIGNALS_USE_TIKHUB: ${SOCIAL_SIGNALS_USE_TIKHUB:-false}
      SOCIAL_DEPTH_GAME_LIMIT: ${SOCIAL_DEPTH_GAME_LIMIT:-8}
      APPGROWING_API_KEY: ${APPGROWING_API_KEY:-}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      POE_API_KEY: ${POE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  # Job scheduler
  scheduler:
    build:
      context: ./workers
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    command: python -m src.scheduler
    volumes:
      - ./shared:/shared:ro
    environment:
      DATABASE_URL: postgresql://dreambig:dreambig@db:5432/dreambig
      REDIS_URL: redis://redis:6379/0
      POE_API_KEY: ${POE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Caddy reverse proxy (auto HTTPS)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
